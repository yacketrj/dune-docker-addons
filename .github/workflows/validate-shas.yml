name: Validate Catalog SHAs

on:
  pull_request:
    paths:
      - "addons/**.json"
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Validate catalog SHA-256 entries
        run: bash scripts/validate-catalog-shas.sh
